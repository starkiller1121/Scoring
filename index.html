<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記分板</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    .add-btn {
      background: #2d89ef;
      color: white;
    }

    .reset-btn {
      background: #e74c3c;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #fafafa;
    }

    .score {
      font-size: 20px;
      font-weight: bold;
    }

    .score-input {
      width: 80px;
      text-align: center;
      padding: 8px;
    }

    .btn-plus {
      background: #27ae60;
      color: white;
      margin-right: 5px;
    }

    .btn-minus {
      background: #f39c12;
      color: white;
      margin-right: 5px;
    }

    .btn-delete {
      background: #7f8c8d;
      color: white;
    }

    .rank-1 {
      background: #fff8dc;
    }

    .rank-2 {
      background: #f5f5f5;
    }

    .rank-3 {
      background: #fce5cd;
    }

    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        background: #fff;
        margin-bottom: 12px;
        border-radius: 12px;
        padding: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }

      td {
        border: none;
        padding: 8px 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>多人記分板</h1>

    <div class="top-bar">
      <input type="text" id="playerName" placeholder="輸入玩家名稱" />
      <button class="add-btn" onclick="addPlayer()">新增玩家</button>
      <button class="reset-btn" onclick="resetScores()">全部歸零</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>排名</th>
          <th>玩家</th>
          <th>分數</th>
          <th>輸入分數</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="scoreTable"></tbody>
    </table>
  </div>

  <script>
    let players = [
      { name: "玩家A", score: 0 },
      { name: "玩家B", score: 0 }
    ];

    function renderTable() {
      players.sort((a, b) => b.score - a.score);

      const table = document.getElementById("scoreTable");
      table.innerHTML = "";

      players.forEach((player, index) => {
        const tr = document.createElement("tr");

        if (index === 0) tr.classList.add("rank-1");
        else if (index === 1) tr.classList.add("rank-2");
        else if (index === 2) tr.classList.add("rank-3");

        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${player.name}</td>
          <td class="score">${player.score}</td>
          <td>
            <input type="number" id="scoreInput-${index}" class="score-input" value="1" min="1">
          </td>
          <td>
            <button class="btn-plus" onclick="changeScore(${index}, 'add')">加分</button>
            <button class="btn-minus" onclick="changeScore(${index}, 'subtract')">扣分</button>
            <button class="btn-delete" onclick="deletePlayer(${index})">刪除</button>
          </td>
        `;

        table.appendChild(tr);
      });
    }

    function addPlayer() {
      const input = document.getElementById("playerName");
      const name = input.value.trim();

      if (!name) {
        alert("請先輸入玩家名稱");
        return;
      }

      players.push({ name, score: 0 });
      input.value = "";
      renderTable();
    }

    function changeScore(index, action) {
      const input = document.getElementById(`scoreInput-${index}`);
      const value = parseInt(input.value);

      if (isNaN(value) || value < 1) {
        alert("請輸入正確的分數");
        return;
      }

      if (action === "add") {
        players[index].score += value;
      } else if (action === "subtract") {
        players[index].score -= value;
      }

      renderTable();
    }

    function deletePlayer(index) {
      players.splice(index, 1);
      renderTable();
    }

    function resetScores() {
      players.forEach(player => player.score = 0);
      renderTable();
    }

    renderTable();
  </script>
</body>
</html>
